<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Black background circle -->
  <circle cx="32" cy="32" r="32" fill="#000000"/>
  <!-- Gold shopping bag icon -->
  <g transform="translate(13, 10)">
    <!-- Bag handle -->
    <path d="M10 14 C10 7 28 7 28 14" stroke="#FFC700" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Bag body -->
    <rect x="4" y="14" width="30" height="22" rx="4" fill="#FFC700"/>
    <!-- Bag lines detail -->
    <line x1="14" y1="14" x2="14" y2="36" stroke="#000" stroke-width="1.5" opacity="0.2"/>
    <line x1="24" y1="14" x2="24" y2="36" stroke="#000" stroke-width="1.5" opacity="0.2"/>
    <!-- VC coin hint -->
    <circle cx="19" cy="25" r="5" fill="#000" opacity="0.15"/>
    <text x="19" y="29" text-anchor="middle" font-size="7" font-weight="bold" fill="#000" font-family="Arial" opacity="0.5">VC</text>
  </g>
</svg>